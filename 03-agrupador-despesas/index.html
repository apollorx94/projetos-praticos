<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="img/favicon.ico" type="image/x-icon">
    <title>Agrupador de Transações</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <div class="container py-5">

        <header class="text-center mb-5">
            <h1 class="display-5 fw-bold">Agrupador de Transações</h1>
        </header>

        <main class="row justify-content-center">
            <div class="col-12 col-lg-8">

                <div class="card shadow-sm">
                    <div class="card-body p-4">

                        <form action="resultado.php" method="POST">

                            <h2 class="h4 mb-4">Nova Transação</h2>

                            <div id="transacoes">

                                <div class="linha-transacao row gy-2 align-items-center mb-3">
                                    <div class="col-12 col-md-3">
                                        <select name="tipo[]" class="form-select">
                                            <option value="entrada">Entrada</option>
                                            <option value="saida">Saída</option>
                                        </select>
                                    </div>
                                    <div class="col-12 col-md-3">
                                        <input type="number" name="valor[]" class="form-control"
                                            placeholder="Valor R$" step="0.01">
                                    </div>
                                    <div class="col-12 col-md-6">
                                        <input type="text" name="descricao[]" class="form-control"
                                            placeholder="Descrição">
                                    </div>
                                </div>

                            </div>

                            <div class="d-flex flex-wrap gap-2 mt-3">
                                <button type="button" id="btn-adicionar" class="btn btn-outline-primary">+
                                    Adicionar transação</button>
                                <button type="submit" class="btn btn-primary ms-auto">Calcular</button>
                            </div>

                        </form>

                    </div>
                </div>

            </div>
        </main>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
    // Pega o botão de adicionar
    const btnAdicionar = document.getElementById('btn-adicionar');

    // Pega o container onde ficam as linhas
    const container = document.getElementById('transacoes');

    // Quando clicar no botão
    btnAdicionar.addEventListener('click', function() {

        // Cria uma nova div
        const novaLinha = document.createElement('div');
        novaLinha.className = 'linha-transacao row gy-2 align-items-center mb-3';

        // Define o conteúdo HTML da nova linha
        novaLinha.innerHTML = `
            <div class="col-12 col-md-3">
                <select name="tipo[]" class="form-select">
                    <option value="entrada">Entrada</option>
                    <option value="saida">Saída</option>
                </select>
            </div>
            <div class="col-12 col-md-3">
                <input type="number" name="valor[]" class="form-control" placeholder="Valor R$" step="0.01">
            </div>
            <div class="col-12 col-md-5">
                <input type="text" name="descricao[]" class="form-control" placeholder="Descrição">
            </div>
            <div class="col-12 col-md-1 text-md-end">
                <button type="button" class="btn btn-outline-danger btn-remover w-100">Remover</button>
            </div>
        `;

        // Adiciona a nova linha no container
        container.appendChild(novaLinha);

        // Ouve o botão remover da nova linha
        novaLinha.querySelector('.btn-remover').addEventListener('click', function() {
            novaLinha.remove();
        });
    });
    </script>
</body>

</html>
